server:
  port: 8080

spring:
  application:
    name: skillproof-backend
    profiles:
      active: local

  datasource:
    url: jdbc:mysql://localhost:3306/skillproof?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: skillproof_user
    password: skillproof123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # auto-creates/updates tables on startup
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Disable default Spring Security form login — we handle auth ourselves
  security:
    user:
      name: disabled

# GitHub OAuth App credentials — replace with your actual values
github:
  client-id: ${GITHUB_CLIENT_ID:Ov23ligqK4lub20Xlo5J}
  client-secret: ${GITHUB_CLIENT_SECRET:1a9419ba8d7fdd4fead190bea958c27f7434b6f1}
  redirect-uri: http://localhost:8080/api/auth/github/callback
  scope: read:user,public_repo

# JWT settings
jwt:
  secret: ${JWT_SECRET:7f9a2b8c1d4e6f0a9c3b5d7e8f1a2c4e6b8d9f0a1c3e5b7d9f2a4c6e8b1d3f5}
  expiration-ms: 86400000     # 24 hours in milliseconds
  refresh-expiration-ms: 604800000  # 7 days

# Python AI service URL
ai-service:
  url: http://localhost:8000

# Test/Development mode — bypass limits
testing:
  bypass-verification-limit: true

# CORS — allow Next.js frontend
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:3001
    - https://skillproof.vercel.app

logging:
  level:
    com.skillproof: DEBUG
    org.springframework.security: DEBUG

