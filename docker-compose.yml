services:
  mysql:
    image: mysql:8.0
    container_name: skillproof-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: skillproof
      MYSQL_USER: skillproof_user
      MYSQL_PASSWORD: skillproof123
      TZ: UTC
    ports:
      - "3307:3306"
    volumes:
      - skillproof_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  skillproof_mysql_data:
    name: skillproof_mysql_data
