github:
  client-id: ${GITHUB_CLIENT_ID:dev-github-client-id}
  client-secret: ${GITHUB_CLIENT_SECRET:dev-github-client-secret}

jwt:
  secret: ${JWT_SECRET:dev-only-jwt-secret-change-this-before-sharing}

spring:
  config:
    import: optional:file:.env[.properties]
  devtools:
    restart:
      enabled: ${DEVTOOLS_RESTART_ENABLED:false}
      poll-interval: 2s
      quiet-period: 1s
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/skillproof?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:skillproof_user}
    password: ${DB_PASSWORD:}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

ai-service:
  secret: ${AI_SERVICE_SECRET:dev-internal-secret-change-me}

notification:
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:true}
    from: ${NOTIFICATION_EMAIL_FROM:noreply@skillproof.dev}

daily:
  api-key: ${DAILY_API_KEY:}
  base-url: ${DAILY_BASE_URL:https://api.daily.co/v1}

video:
  provider: ${VIDEO_PROVIDER:auto}
  jitsi-base-url: ${JITSI_BASE_URL:https://meet.jit.si}

challenge:
  docker:
    enabled: ${CHALLENGE_DOCKER_ENABLED:true}
    timeout-seconds: ${CHALLENGE_DOCKER_TIMEOUT_SECONDS:30}
    memory-limit-mb: ${CHALLENGE_DOCKER_MEMORY_LIMIT_MB:256}
    temp-dir: ${CHALLENGE_DOCKER_TEMP_DIR:${java.io.tmpdir}/skillproof-submissions}
    command: ${CHALLENGE_DOCKER_COMMAND:docker}
    host: ${CHALLENGE_DOCKER_HOST:}

phase2:
  mixed-questions-enabled: ${PHASE2_MIXED_QUESTIONS_ENABLED:false}
  total-questions: ${PHASE2_TOTAL_QUESTIONS:7}
  conceptual-questions: ${PHASE2_CONCEPTUAL_QUESTIONS:3}
  weighted-scoring-enabled: ${PHASE2_WEIGHTED_SCORING_ENABLED:false}
  code-weight-percent: ${PHASE2_CODE_WEIGHT_PERCENT:60}
  conceptual-weight-percent: ${PHASE2_CONCEPTUAL_WEIGHT_PERCENT:40}

testing:
  bypass-verification-limit: ${BYPASS_VERIFICATION_LIMIT:true}
  skip-repo-cooldown: ${SKIP_REPO_COOLDOWN:true}

http:
  client:
    connect-timeout: ${HTTP_CONNECT_TIMEOUT:10s}
    read-timeout: ${HTTP_READ_TIMEOUT:30s}
    proxy-host: ${HTTP_PROXY_HOST:}
    proxy-port: ${HTTP_PROXY_PORT:0}