server:
  port: 8080

spring:
  application:
    name: skillproof-backend
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3307/skillproof?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: skillproof_user
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # auto-creates/updates tables on startup
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Disable default Spring Security form login — we handle auth ourselves
  security:
    user:
      name: disabled

# GitHub OAuth App credentials — replace with your actual values
github:
  client-id: ${GITHUB_CLIENT_ID}
  client-secret: ${GITHUB_CLIENT_SECRET}
  redirect-uri: http://localhost:8080/api/auth/github/callback
  scope: read:user,public_repo

# JWT settings
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000     # 24 hours in milliseconds
  refresh-expiration-ms: 604800000  # 7 days

# Python AI service URL
ai-service:
  url: http://localhost:8000
  secret: ${AI_SERVICE_SECRET}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

notification:
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:true}
    from: ${NOTIFICATION_EMAIL_FROM:noreply@skillproof.dev}

daily:
  api-key: ${DAILY_API_KEY:}
  base-url: ${DAILY_BASE_URL:https://api.daily.co/v1}

challenge:
  docker:
    enabled: ${CHALLENGE_DOCKER_ENABLED:true}
    timeout-seconds: ${CHALLENGE_DOCKER_TIMEOUT_SECONDS:30}
    memory-limit-mb: ${CHALLENGE_DOCKER_MEMORY_LIMIT_MB:256}
    temp-dir: ${CHALLENGE_DOCKER_TEMP_DIR:${java.io.tmpdir}/skillproof-submissions}
    command: ${CHALLENGE_DOCKER_COMMAND:docker}
    host: ${CHALLENGE_DOCKER_HOST:}

phase2:
  mixed-questions-enabled: false
  total-questions: 7
  conceptual-questions: 3
  weighted-scoring-enabled: false
  code-weight-percent: 60
  conceptual-weight-percent: 40

# Test/Development mode — bypass limits
testing:
  bypass-verification-limit: true
  skip-repo-cooldown: false

# CORS — allow Next.js frontend
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:3001
    - https://skillproof.vercel.app

logging:
  level:
    com.skillproof: DEBUG
    org.springframework.security: DEBUG

http:
  client:
    connect-timeout: ${HTTP_CONNECT_TIMEOUT:10s}
    read-timeout: ${HTTP_READ_TIMEOUT:30s}
    proxy-host: ${HTTP_PROXY_HOST:}
    proxy-port: ${HTTP_PROXY_PORT:0}

