server:
  port: 8080

spring:
  application:
    name: skillproof-backend
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/skillproof?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: skillproof_user
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # auto-creates/updates tables on startup
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Disable default Spring Security form login — we handle auth ourselves
  security:
    user:
      name: disabled

# GitHub OAuth App credentials — replace with your actual values
github:
  client-id: ${GITHUB_CLIENT_ID}
  client-secret: ${GITHUB_CLIENT_SECRET}
  redirect-uri: http://localhost:8080/api/auth/github/callback
  scope: read:user,public_repo

# JWT settings
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000     # 24 hours in milliseconds
  refresh-expiration-ms: 604800000  # 7 days

# Python AI service URL
ai-service:
  url: http://localhost:8000
  secret: ${AI_SERVICE_SECRET}

# Test/Development mode — bypass limits
testing:
  bypass-verification-limit: true

# CORS — allow Next.js frontend
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:3001
    - https://skillproof.vercel.app

logging:
  level:
    com.skillproof: DEBUG
    org.springframework.security: DEBUG

